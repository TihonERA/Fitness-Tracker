services:
  db:
    image: postgres:16.0
    container_name: fitness_db
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - main-net
      - db-net

  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 5s 
      timeout: 5s 
      retries: 5
    volumes:
      - redis-data:/data
    networks:
      - main-net
      - redis-net

  web:
    build: .
    container_name: backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic -c /code/alembic.ini upgrade head && uvicorn Backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /code"
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/code
    networks:
      - main-net
      - db-net
      - redis-net
      - worker-net

  celery:
    build: .
    container_name: celery
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    command: celery -A Backend.tasks.muscle_rates worker --loglevel=INFO
    volumes:
      - .:/code
    env_file:
      - .env
    networks:
      - worker-net
      - redis-net
      - db-net
      - main-net
      
networks:
  main-net:
  db-net:
  redis-net:
  worker-net:
volumes:
  db-data:
  redis-data:

